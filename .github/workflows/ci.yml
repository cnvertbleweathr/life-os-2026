name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile-check all Python files
        run: python -m compileall -q api pipelines scripts dbt/macros

  hardcode-audit:
    name: Hardcoded-year audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Fail on stray hardcoded prior-year comparisons
        run: |
          set -e
          YEAR=$(date +%Y)
          LAST_YEAR=$((YEAR - 1))
          # Catches the class of bug fixed in fitness_metrics.py: a literal
          # comparison against last year's number that should have rolled
          # forward to datetime.now().year (or an explicit --year arg).
          if grep -rn "== ${LAST_YEAR}\b" --include="*.py" api pipelines scripts; then
            echo ""
            echo "Found a hardcoded ${LAST_YEAR} comparison above."
            echo "Check whether it should use datetime.now().year or tz_utils.denver_year() instead."
            exit 1
          fi
          echo "No stray ${LAST_YEAR} hardcodes found."

  dbt-parse:
    name: dbt parse
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dbt-duckdb
        run: pip install dbt-duckdb
      - name: dbt parse (validates Jinja/SQL/schema, no live warehouse needed)
        env:
          DBT_PROFILES_DIR: ./profiles
        run: dbt parse

  typescript:
    name: Next.js TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
